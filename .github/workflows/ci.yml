# CI for a coding-loop target repo. The control plane aggregates GitHub
# Actions check-runs on the PR head into one CI status (success wins the
# merge rule only when every check passes), and the review phase refuses to
# act until CI concludes — so this workflow must run on every pull request.
#
# Sessions also run the suites in their sandbox, but CI is the merge
# authority. Both suites run Envoy-free everywhere (see
# backend/tests/conftest.py): no test uses the HTTP surface, and
# Envoy-in-Docker races on runner port allocation (actions run
# 29357037307).
name: ci

on:
  pull_request:

jobs:
  chat-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run rbt generate
      - run: PYTHONPATH=backend/src:backend/api uv run pytest backend/tests -q
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web

  webapp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
        working-directory: webapp
      - run: uv run rbt generate
        working-directory: webapp
      - run: PYTHONPATH=backend/src:backend/api uv run pytest backend/tests -q
        working-directory: webapp
      - run: npm ci
        working-directory: webapp/web
      - run: npm run build
        working-directory: webapp/web
